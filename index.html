<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tienda</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--P:#6C5CE7;--A:#00CEC9;--G:#00B894;--O:#FDCB6E;--R:#FF7675;--N:#0D0D0D;--S:#141414;--B2:#1C1C1C;--BOR:#252525;--T:#FFFFFF;--T2:#888;}
body{background:var(--N);font-family:'Inter',sans-serif;color:var(--T);padding-bottom:80px;-webkit-font-smoothing:antialiased;}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--N);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.loader-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--P),var(--A));display:flex;align-items:center;justify-content:center;font-size:1.8rem;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.loader-txt{font-size:.78rem;color:var(--T2);font-weight:600;}

/* TOP */
.topbar{background:rgba(13,13,13,.97);backdrop-filter:blur(12px);padding:44px 16px 12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--BOR);}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.brand-logo{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden;flex-shrink:0;}
.brand-logo img{width:100%;height:100%;object-fit:cover;}
.brand-nom{font-size:1rem;font-weight:900;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.tbtn{width:36px;height:36px;background:var(--B2);border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
.tbtn svg{width:17px;height:17px;stroke:var(--T2);fill:none;stroke-width:2;}
.tbtn-badge{position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;background:var(--R);color:white;font-size:.48rem;font-weight:800;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--N);display:none;}

/* SEARCH */
.search-wrap{padding:10px 16px;display:none;}
.search-wrap.show{display:block;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--B2);border:1px solid var(--BOR);border-radius:24px;padding:10px 15px;}
.search-box svg{width:14px;height:14px;stroke:var(--T2);fill:none;stroke-width:2.5;flex-shrink:0;}
.search-box input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:.86rem;color:var(--T);}
.search-box input::placeholder{color:#333;}

/* HERO */
.hero{margin:14px 16px;border-radius:20px;overflow:hidden;position:relative;min-height:160px;padding:24px;background:linear-gradient(135deg,#1a0533,#0a1a3a);}
.hero-deco{position:absolute;right:-20px;top:-20px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(108,92,231,.3),transparent 70%);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(108,92,231,.3);border:1px solid rgba(108,92,231,.5);border-radius:20px;padding:3px 10px;font-size:.6rem;font-weight:800;color:var(--P);margin-bottom:10px;text-transform:uppercase;}
.hero-tit{font-size:1.4rem;font-weight:900;line-height:1.15;margin-bottom:6px;position:relative;}
.hero-sub{font-size:.76rem;color:rgba(255,255,255,.5);margin-bottom:14px;position:relative;}
.hero-btn{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--P),var(--A));border:none;border-radius:20px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:800;color:white;cursor:pointer;position:relative;}

/* CATS */
.cats-scroll{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.cats-scroll::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--BOR);background:var(--S);font-size:.72rem;font-weight:700;color:var(--T2);cursor:pointer;white-space:nowrap;}
.cat-chip.active{background:linear-gradient(135deg,var(--P),var(--A));color:white;border-color:transparent;}

/* GRID */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:10px;}
.sec-tit{font-size:.88rem;font-weight:800;}
.sec-cnt{font-size:.7rem;color:var(--T2);}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:20px;}
.prod-card{background:var(--S);border:1px solid var(--BOR);border-radius:16px;overflow:hidden;cursor:pointer;transition:.15s;}
.prod-card:active{transform:scale(.97);}
.prod-img{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;}
.prod-badge{position:absolute;top:7px;left:7px;font-size:.54rem;font-weight:800;padding:2px 7px;border-radius:20px;color:white;background:linear-gradient(135deg,var(--P),var(--A));}
.prod-fav{position:absolute;top:7px;right:7px;width:26px;height:26px;background:rgba(0,0,0,.5);border-radius:50%;border:none;cursor:pointer;font-size:.86rem;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.prod-body{padding:10px 11px 12px;}
.prod-cat{font-size:.56rem;font-weight:700;color:var(--T2);text-transform:uppercase;margin-bottom:2px;}
.prod-nom{font-size:.8rem;font-weight:700;color:var(--T);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;margin-bottom:3px;}
.prod-stars{font-size:.6rem;color:var(--O);margin-bottom:5px;}
.prod-footer{display:flex;align-items:center;justify-content:space-between;}
.prod-precio{font-size:.92rem;font-weight:900;}
.prod-precio-old{font-size:.6rem;color:var(--T2);text-decoration:line-through;display:block;}
.add-btn{width:28px;height:28px;background:linear-gradient(135deg,var(--P),var(--A));border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-btn svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2.5;}

/* SCROLL HORIZONTAL */
.hscroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:18px;}
.hscroll::-webkit-scrollbar{display:none;}
.hcard{flex-shrink:0;width:160px;background:var(--S);border:1px solid var(--BOR);border-radius:14px;overflow:hidden;cursor:pointer;}
.hcard-img{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;overflow:hidden;position:relative;}
.hcard-img img{width:100%;height:100%;object-fit:cover;}
.hcard-body{padding:9px 10px 11px;}
.hcard-nom{font-size:.76rem;font-weight:700;color:var(--T);margin-bottom:3px;line-height:1.3;}
.hcard-precio{font-size:.86rem;font-weight:900;background:linear-gradient(90deg,var(--P),var(--A));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* DETALLE */
.det-imgs{position:relative;background:var(--S);}
.det-imgs-slide{display:flex;transition:transform .3s cubic-bezier(.16,1,.3,1);}
.det-img-item{min-width:100vw;height:280px;display:flex;align-items:center;justify-content:center;font-size:5rem;overflow:hidden;}
.det-img-item img{width:100%;height:100%;object-fit:cover;}
.det-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.det-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);}
.det-dot.active{background:white;width:16px;border-radius:4px;}
.det-back{position:absolute;top:48px;left:12px;width:34px;height:34px;background:rgba(0,0,0,.6);border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.det-back svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;}
.det-fav{position:absolute;top:48px;right:12px;width:34px;height:34px;background:rgba(0,0,0,.6);border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);font-size:.96rem;}
.det-body{padding:16px;}
.det-cat{font-size:.6rem;color:var(--T2);text-transform:uppercase;font-weight:700;margin-bottom:4px;}
.det-nom{font-size:1.2rem;font-weight:900;margin-bottom:6px;line-height:1.2;}
.det-stars{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:.74rem;}
.det-precio-wrap{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;}
.det-precio{font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,var(--P),var(--A));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.det-precio-old{font-size:.86rem;color:var(--T2);text-decoration:line-through;}
.det-desc{font-size:.82rem;color:var(--T2);line-height:1.7;margin-bottom:14px;}
.det-atrs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.det-atr{background:var(--B2);border-radius:10px;padding:10px 12px;}
.det-atr-lbl{font-size:.56rem;color:var(--T2);text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.det-atr-val{font-size:.82rem;font-weight:700;}
.vars-tit{font-size:.64rem;font-weight:700;color:var(--T2);text-transform:uppercase;margin-bottom:7px;}
.vars-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.var-chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--BOR);background:var(--B2);font-size:.74rem;font-weight:700;color:var(--T2);cursor:pointer;}
.var-chip.sel{border-color:var(--P);color:var(--P);background:rgba(108,92,231,.1);}
.var-color{width:26px;height:26px;border-radius:50%;border:2px solid var(--BOR);cursor:pointer;}
.var-color.sel{border-color:white;box-shadow:0 0 0 2px var(--P);}
.cant-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.cant-lbl{font-size:.64rem;font-weight:700;color:var(--T2);text-transform:uppercase;margin-right:auto;}
.cant-btn{width:32px;height:32px;border-radius:9px;background:var(--B2);border:1px solid var(--BOR);color:var(--T);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cant-num{font-size:1rem;font-weight:900;min-width:22px;text-align:center;}
.det-bar{position:fixed;bottom:0;width:100%;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-top:1px solid var(--BOR);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:9px;z-index:200;}
.btn-add-cart{flex:1;padding:13px;background:var(--B2);border:1px solid var(--BOR);border-radius:12px;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:800;color:var(--T);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-add-cart svg{width:16px;height:16px;stroke:var(--T);fill:none;stroke-width:2;}
.btn-comprar{flex:2;padding:13px;background:linear-gradient(135deg,var(--P),var(--A));border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.86rem;font-weight:800;color:white;cursor:pointer;}

/* CARRITO */
.cart-item{background:var(--S);border:1px solid var(--BOR);border-radius:14px;padding:12px;display:flex;gap:10px;margin-bottom:8px;align-items:center;}
.ci-img{width:54px;height:54px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--B2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.ci-img img{width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;min-width:0;}
.ci-nom{font-size:.8rem;font-weight:700;margin-bottom:2px;}
.ci-var{font-size:.62rem;color:var(--T2);}
.ci-precio{font-size:.86rem;font-weight:900;margin-top:5px;}
.ci-cant-row{display:flex;align-items:center;gap:7px;margin-top:5px;}
.ci-cbtn{width:24px;height:24px;border-radius:7px;background:var(--B2);border:1px solid var(--BOR);color:var(--T);font-size:.86rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ci-cnum{font-size:.82rem;font-weight:800;min-width:18px;text-align:center;}
.ci-del{width:26px;height:26px;background:rgba(255,118,117,.1);border:none;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto;}
.ci-del svg{width:12px;height:12px;stroke:var(--R);fill:none;stroke-width:2.5;}
.resumen{background:var(--S);border:1px solid var(--BOR);border-radius:14px;padding:14px;margin-top:4px;}
.res-row{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:8px;}
.res-row span{color:var(--T2);}
.res-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:900;border-top:1px solid var(--BOR);padding-top:10px;margin-top:4px;}
.btn-ckout{width:100%;padding:14px;background:linear-gradient(135deg,var(--P),var(--A));border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:800;color:white;cursor:pointer;margin-top:12px;}
.empty-cart{text-align:center;padding:50px 20px;}
.empty-cart-ico{font-size:3rem;margin-bottom:12px;}
.empty-cart-tit{font-size:.96rem;font-weight:800;margin-bottom:6px;}
.empty-cart-sub{font-size:.78rem;color:var(--T2);margin-bottom:18px;}
.btn-seguir{background:linear-gradient(135deg,var(--P),var(--A));border:none;border-radius:20px;padding:10px 22px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:800;color:white;cursor:pointer;}

/* CHECKOUT */
.ck-body{padding:16px;}
.ck-steps{display:flex;align-items:center;gap:0;margin-bottom:20px;}
.ck-step{flex:1;text-align:center;}
.ck-step-dot{width:26px;height:26px;border-radius:50%;background:var(--B2);border:1px solid var(--BOR);display:flex;align-items:center;justify-content:center;margin:0 auto 3px;font-size:.66rem;font-weight:800;color:var(--T2);}
.ck-step-dot.act{background:linear-gradient(135deg,var(--P),var(--A));border-color:transparent;color:white;}
.ck-step-lbl{font-size:.58rem;color:var(--T2);font-weight:700;}
.ck-step-lbl.act{color:var(--P);}
.ck-sep{flex:1;height:1px;background:var(--BOR);margin-bottom:16px;}
.ck-sep.act{background:var(--P);}
.ck-sec{font-size:.64rem;font-weight:800;color:var(--T2);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;}
.ck-field{margin-bottom:10px;}
.ck-field label{display:block;font-size:.62rem;font-weight:700;color:var(--T2);text-transform:uppercase;margin-bottom:4px;}
.ck-field input,.ck-field select,.ck-field textarea{width:100%;padding:10px 12px;background:var(--B2);border:1px solid var(--BOR);border-radius:10px;font-family:'Inter',sans-serif;font-size:.86rem;color:var(--T);outline:none;-webkit-appearance:none;}
.ck-field input:focus,.ck-field select:focus{border-color:var(--P);}
.ck-field input::placeholder{color:#333;}
.ck-field select option{background:var(--B2);}
.ck-frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.metodos-pago{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.mpago{background:var(--B2);border:1.5px solid var(--BOR);border-radius:11px;padding:11px;text-align:center;cursor:pointer;}
.mpago.sel{border-color:var(--P);background:rgba(108,92,231,.08);}
.mpago-ico{font-size:1.3rem;margin-bottom:3px;}
.mpago-lbl{font-size:.66rem;font-weight:700;color:var(--T2);}
.mpago.sel .mpago-lbl{color:var(--P);}
.transfer-info{background:var(--B2);border:1px solid var(--BOR);border-radius:11px;padding:12px;margin-top:10px;}
.transfer-row{display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:6px;}
.transfer-row span{color:var(--T2);}
.transfer-row b{color:var(--T);}
.comprobante-area{border:2px dashed var(--BOR);border-radius:12px;padding:16px;text-align:center;cursor:pointer;position:relative;margin-top:10px;}
.comprobante-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.comprobante-preview{width:100%;border-radius:10px;max-height:150px;object-fit:cover;margin-top:8px;display:none;}
.ck-nav{display:flex;gap:8px;margin-top:16px;}
.ck-nav-back{flex:1;padding:13px;background:var(--B2);border:1px solid var(--BOR);border-radius:12px;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:700;color:var(--T2);cursor:pointer;}
.ck-nav-next{flex:2;padding:13px;background:linear-gradient(135deg,var(--P),var(--A));border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:800;color:white;cursor:pointer;}

/* SUCCESS */
.success-view{display:flex;flex-direction:column;align-items:center;text-align:center;padding:56px 24px;}
.success-ico{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--P),var(--A));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:2rem;}
.success-tit{font-size:1.2rem;font-weight:900;margin-bottom:6px;}
.success-sub{font-size:.8rem;color:var(--T2);line-height:1.6;margin-bottom:14px;}
.order-num{background:var(--B2);border:1px solid var(--BOR);border-radius:10px;padding:10px 18px;font-family:monospace;font-size:.96rem;font-weight:800;color:var(--P);margin-bottom:20px;}

/* AUTH */
.auth-overlay{position:fixed;inset:0;background:var(--N);z-index:800;display:none;align-items:center;justify-content:center;padding:24px;}
.auth-overlay.show{display:flex;}
.auth-box{background:var(--S);border:1px solid var(--BOR);border-radius:22px;padding:24px;width:100%;max-width:380px;}
.auth-tit{font-size:1.1rem;font-weight:900;margin-bottom:4px;}
.auth-sub{font-size:.76rem;color:var(--T2);margin-bottom:20px;}
.auth-tabs{display:flex;background:var(--B2);border-radius:11px;padding:3px;gap:3px;margin-bottom:16px;}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:700;color:var(--T2);cursor:pointer;border-radius:8px;}
.auth-tab.active{background:linear-gradient(135deg,var(--P),var(--A));color:white;}
.auth-field{margin-bottom:10px;}
.auth-field label{display:block;font-size:.62rem;font-weight:700;color:var(--T2);text-transform:uppercase;margin-bottom:4px;}
.auth-field input{width:100%;padding:10px 12px;background:var(--B2);border:1px solid var(--BOR);border-radius:10px;font-family:'Inter',sans-serif;font-size:.86rem;color:var(--T);outline:none;}
.auth-field input:focus{border-color:var(--P);}
.auth-field input::placeholder{color:#333;}
.auth-frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-auth{width:100%;padding:13px;background:linear-gradient(135deg,var(--P),var(--A));border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:800;color:white;cursor:pointer;margin-top:4px;}
.auth-err{color:var(--R);font-size:.72rem;text-align:center;margin-top:8px;display:none;}
.auth-err.show{display:block;}
.auth-close{position:absolute;top:12px;right:12px;width:28px;height:28px;background:var(--B2);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.auth-close svg{width:13px;height:13px;stroke:#666;fill:none;stroke-width:2.5;}

/* PERFIL */
.perfil-view{padding:16px;}
.perfil-hero{background:linear-gradient(135deg,rgba(108,92,231,.2),rgba(0,206,201,.1));border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;}
.perfil-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--P),var(--A));display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.4rem;font-weight:800;color:white;}
.perfil-nom{font-size:1rem;font-weight:800;margin-bottom:2px;}
.perfil-email{font-size:.72rem;color:var(--T2);}
.perfil-item{background:var(--S);border:1px solid var(--BOR);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.perfil-ico{width:34px;height:34px;background:var(--B2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.96rem;flex-shrink:0;}
.perfil-info{flex:1;}
.perfil-lbl{font-size:.82rem;font-weight:700;}
.perfil-sub{font-size:.66rem;color:var(--T2);}


/* MODAL */
.modOv{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:flex-end;z-index:500;}
.modOv.on{display:flex;}
.modSh{background:var(--S);width:100%;max-height:92vh;border-radius:24px 24px 0 0;transform:translateY(100%);transition:.4s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--BOR);border-bottom:none;}
.modOv.on .modSh{transform:translateY(0);}
.drag{width:36px;height:4px;background:#333;border-radius:4px;margin:14px auto 0;flex-shrink:0;}
.modH{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--BOR);flex-shrink:0;}
.modT{font-size:.96rem;font-weight:800;}
.modX{width:27px;height:27px;background:var(--B2);border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modX svg{width:12px;height:12px;stroke:#666;fill:none;stroke-width:2.5;}
.modB{overflow-y:auto;padding:16px 16px 32px;flex:1;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:2000;display:none;align-items:center;justify-content:center;}
.lightbox.on{display:flex;}
.lightbox img{max-width:100vw;max-height:90vh;object-fit:contain;}
.lb-close{position:absolute;top:46px;right:14px;width:34px;height:34px;background:rgba(255,255,255,.1);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-close svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;width:100%;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-top:1px solid var(--BOR);display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:200;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;padding:4px 0;text-decoration:none;}
.tab svg{width:20px;height:20px;stroke:#333;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab span{font-size:.5rem;font-weight:700;color:#333;text-transform:uppercase;}
.tab.active svg{stroke:var(--P);}
.tab.active span{color:var(--P);}
.tab-rel{position:relative;}
.tab-bdg{position:absolute;top:-2px;right:3px;min-width:14px;height:14px;background:var(--R);color:white;font-size:.46rem;font-weight:800;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--N);}

.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--P),var(--A));color:white;padding:10px 20px;border-radius:24px;font-size:.78rem;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:3000;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-sec{text-align:center;padding:30px;color:#333;font-size:.8rem;}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const db=createClient('https://kgwvhgbywfwzkidamcru.supabase.co','sb_publishable_wp0_hOpq71-jCYKMEWMqVg_6fSL_h-C');

// ── OBTENER SLUG DE LA TIENDA (desde URL o por defecto) ────────────
const SLUG=new URLSearchParams(location.search).get('tienda')||'demo';
const Q=id=>document.getElementById(id);
function toast(m){const t=Q('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

// ── ESTADO ─────────────────────────────────────────────────────────
let tienda=null,productos=[],categorias=[],anuncios=[],bancos=[];
let cliente=JSON.parse(localStorage.getItem('nexstore_cliente_'+SLUG)||'null');
let carrito=JSON.parse(localStorage.getItem('nexstore_cart_'+SLUG)||'[]');
let favs=JSON.parse(localStorage.getItem('nexstore_favs_'+SLUG)||'[]');
let state={view:'inicio',activeCat:'Todos',busq:'',detalle:null,cant:1,varSel:{},imgIdx:0,checkout:{paso:1,metodo:'transferencia'},comprobante64:''};
let imgSwipeX=0;

// 7 TOQUES SECRETOS → admin
let tapCnt=0,tapTmr=null;
Q('brand-logo-wrap').addEventListener('click',()=>{
  tapCnt++;clearTimeout(tapTmr);
  if(tapCnt>=7){tapCnt=0;window.open('admin.html?tienda='+SLUG,'_blank');}
  tapTmr=setTimeout(()=>tapCnt=0,3000);
});

// ── INIT ───────────────────────────────────────────────────────────
(async()=>{
  await cargarTienda();
  Q('loader').style.display='none';
  Q('main-panel').style.display='block';
  updateCartBadge();
  render();
})();

async function cargarTienda(){
  const {data:t}=await db.from('tiendas').select('*').eq('slug',SLUG).single();
  if(!t){Q('loader').innerHTML='<div style="color:#666;text-align:center;padding:20px;">Tienda no encontrada.<br><small>Verifica el parámetro ?tienda=slug</small></div>';return;}
  tienda=t;
  aplicarBranding(t);

  const [{data:prods},{data:cats},{data:ans},{data:bcos}]=await Promise.all([
    db.from('productos').select('*').eq('tienda_id',t.id).eq('activo',true).order('created_at',{ascending:false}),
    db.from('categorias').select('*').eq('tienda_id',t.id).order('orden'),
    db.from('anuncios').select('*').eq('tienda_id',t.id).eq('activo',true).order('orden'),
    db.from('bancos').select('*').eq('tienda_id',t.id),
  ]);
  productos=prods||[];
  categorias=(cats||[]).map(c=>c.nombre);
  anuncios=ans||[];
  bancos=bcos||[];
}

function aplicarBranding(t){
  document.title=t.nombre||'Tienda';
  Q('brand-nom-el').textContent=t.nombre||'Tienda';
  Q('loader-logo').textContent=(t.nombre||'T')[0].toUpperCase();
  if(t.logo){Q('brand-logo-el').innerHTML=`<img src="${t.logo}" style="width:100%;height:100%;object-fit:cover;">`;}
  else{Q('brand-logo-el').textContent=(t.nombre||'T')[0].toUpperCase();Q('brand-logo-el').style.background=`linear-gradient(135deg,${t.color_primario||'#6C5CE7'},${t.color_secundario||'#00CEC9'})`;}
  if(t.color_primario)document.documentElement.style.setProperty('--P',t.color_primario);
  if(t.color_secundario)document.documentElement.style.setProperty('--A',t.color_secundario);
  if(t.color_fondo)document.documentElement.style.setProperty('--N',t.color_fondo);
  if(t.color_texto)document.documentElement.style.setProperty('--T',t.color_texto);
}

// ── AUTENTICACIÓN ──────────────────────────────────────────────────
function mostrarAuth(modo,callback){
  state._authCallback=callback;
  switchAuth(modo||'reg');
  Q('auth-overlay').classList.add('show');
  Q('auth-close-btn').onclick=()=>{Q('auth-overlay').classList.remove('show');};
}
function switchAuth(modo){
  Q('auth-tab-reg').classList.toggle('active',modo==='reg');
  Q('auth-tab-login').classList.toggle('active',modo==='login');
  Q('auth-form-reg').style.display=modo==='reg'?'block':'none';
  Q('auth-form-login').style.display=modo==='login'?'block':'none';
  Q('auth-tit').textContent=modo==='reg'?'Crea tu cuenta':'Iniciar sesión';
  Q('auth-sub').textContent=modo==='reg'?'Ingresa tus datos para continuar':'Bienvenido de vuelta';
}

// Hash simple (para demo — en producción usar bcrypt en server)
async function hashPass(pass){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

window.registrar=async function(){
  const nombre=Q('r-nombre').value.trim();const apellido=Q('r-apellido').value.trim();
  const email=Q('r-email').value.trim();const pass=Q('r-pass').value;
  const cedula=Q('r-cedula').value.trim();const tel=Q('r-tel').value.trim();
  const dir=Q('r-dir').value.trim();const ciudad=Q('r-ciudad').value.trim();
  if(!nombre||!apellido||!email||!pass||!cedula){showAuthErr('reg','Completa los campos obligatorios');return;}
  if(pass.length<6){showAuthErr('reg','Contraseña mínimo 6 caracteres');return;}
  const hash=await hashPass(pass);
  const {data,error}=await db.from('clientes').insert({
    tienda_id:tienda.id,nombre,apellido,email,cedula,telefono:tel,
    direccion:dir,ciudad,password_hash:hash
  }).select().single();
  if(error){showAuthErr('reg',error.message.includes('unique')?'Este correo ya está registrado':'Error al crear cuenta');return;}
  cliente=data;
  localStorage.setItem('nexstore_cliente_'+SLUG,JSON.stringify(cliente));
  Q('auth-overlay').classList.remove('show');
  toast('✓ Cuenta creada. Bienvenido, '+nombre+'!');
  if(state._authCallback)state._authCallback();
};

window.loginCliente=async function(){
  const email=Q('l-email').value.trim();const pass=Q('l-pass').value;
  if(!email||!pass){showAuthErr('login','Completa los campos');return;}
  const hash=await hashPass(pass);
  const {data,error}=await db.from('clientes').select('*').eq('tienda_id',tienda.id).eq('email',email).eq('password_hash',hash).single();
  if(error||!data){showAuthErr('login','Correo o contraseña incorrectos');return;}
  cliente=data;
  localStorage.setItem('nexstore_cliente_'+SLUG,JSON.stringify(cliente));
  Q('auth-overlay').classList.remove('show');
  toast('✓ Bienvenido, '+data.nombre+'!');
  if(state._authCallback)state._authCallback();
};

function showAuthErr(form,msg){
  const el=Q(form+'-err');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);
}

// ── CARRITO ────────────────────────────────────────────────────────
function saveCart(){localStorage.setItem('nexstore_cart_'+SLUG,JSON.stringify(carrito));}
function getTotal(){return carrito.reduce((s,i)=>s+i.precio*(i.cant||1),0);}
function getCnt(){return carrito.reduce((s,i)=>s+(i.cant||1),0);}
function updateCartBadge(){
  const cnt=getCnt();const b=Q('cart-badge');const tb=Q('tab-cart-bdg');
  if(cnt>0){b.style.display='flex';b.textContent=cnt>9?'9+':cnt;tb.style.display='flex';tb.textContent=cnt>9?'9+':cnt;}
  else{b.style.display='none';tb.style.display='none';}
}
function addToCart(prod,cant,varSel){
  const key=prod.id+'_'+(varSel?.color||'')+'_'+(varSel?.talla||'')+'_'+(varSel?.vol||'')+'_'+(varSel?.otro||'');
  const idx=carrito.findIndex(i=>i._key===key);
  if(idx>=0)carrito[idx].cant=(carrito[idx].cant||1)+cant;
  else carrito.push({...prod,_key:key,cant,varSel:{...varSel}});
  saveCart();updateCartBadge();
}

// ── FILTRAR ────────────────────────────────────────────────────────
function filtrarProds(){
  let lista=productos;
  if(state.activeCat!=='Todos')lista=lista.filter(p=>p.categoria===state.activeCat);
  if(state.busq){const b=state.busq.toLowerCase();lista=lista.filter(p=>p.nombre.toLowerCase().includes(b));}
  return lista;
}

// ── RENDER ─────────────────────────────────────────────────────────
function mkCard(p){
  const isFav=favs.includes(p.id);
  const img=p.fotos?.[0]||'';
  return `<div class="prod-card" onclick="verDetalle('${p.id}')">
    <div class="prod-img" style="background:${p.color_bg||'var(--B2)'};">
      ${img?`<img src="${img}" alt="">`:`<span>${p.emoji||'📦'}</span>`}
      ${p.badge?`<span class="prod-badge">${p.badge}</span>`:''}
      <button class="prod-fav ${isFav?'liked':''}" onclick="toggleFav(event,'${p.id}')">${isFav?'❤️':'🤍'}</button>
    </div>
    <div class="prod-body">
      <div class="prod-cat">${p.categoria||'—'}</div>
      <div class="prod-nom">${p.nombre}</div>
      <div class="prod-stars">★★★★★</div>
      <div class="prod-footer">
        <div>
          ${p.precio_old?`<span class="prod-precio-old">$${Number(p.precio_old).toFixed(2)}</span>`:''}
          <span class="prod-precio">$${Number(p.precio).toFixed(2)}</span>
        </div>
        <button class="add-btn" onclick="addRapido(event,'${p.id}')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </div>
  </div>`;
}

function renderInicio(){
  const t=tienda||{};
  const destacados=productos.filter(p=>p.destacado).slice(0,8);
  const recientes=productos.slice(0,8);
  const anuHero=anuncios.find(a=>a.posicion==='hero');
  Q('app').innerHTML=`
  <div class="hero" style="background:${anuHero?.tipo_fondo==='imagen'&&anuHero.media_url?`url('${anuHero.media_url}') center/cover`:`linear-gradient(135deg,${anuHero?.color1||'#1a0533'},${anuHero?.color2||'#0a1a3a'})`};">
    <div class="hero-deco"></div>
    <div class="hero-badge">✨ Bienvenido</div>
    <div class="hero-tit">${anuHero?.titulo||t.banner_titulo||'La tienda que lo tiene todo'}</div>
    <div class="hero-sub">${anuHero?.subtitulo||t.banner_sub||'Los mejores productos al mejor precio'}</div>
    <button class="hero-btn" onclick="irA('catalogo')">${anuHero?.cta||t.banner_cta||'Ver catálogo →'}</button>
  </div>
  <div class="cats-scroll">
    ${['Todos',...categorias].map(c=>`<div class="cat-chip ${state.activeCat===c?'active':''}" onclick="selCat('${c}')">${c}</div>`).join('')}
  </div>
  ${destacados.length?`<div class="sec-head"><div class="sec-tit">⚡ Destacados</div><span class="sec-cnt">${destacados.length}</span></div>
  <div class="hscroll">${destacados.map(p=>{const img=p.fotos?.[0]||'';return `<div class="hcard" onclick="verDetalle('${p.id}')"><div class="hcard-img">${img?`<img src="${img}" alt="">`:`<span>${p.emoji||'📦'}</span>`}</div><div class="hcard-body"><div class="hcard-nom">${p.nombre}</div><div class="hcard-precio">$${Number(p.precio).toFixed(2)}</div></div></div>`;}).join('')}</div>`:''}
  <div class="sec-head"><div class="sec-tit">🆕 Novedades</div><span class="sec-cnt">${recientes.length}</span></div>
  <div class="prod-grid">${recientes.length?recientes.map(mkCard).join(''):'<div class="empty-sec" style="grid-column:1/-1">Sin productos aún</div>'}</div>`;
}

function renderCatalogo(){
  const lista=filtrarProds();
  Q('app').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0;">
    <div style="font-size:.88rem;font-weight:800;">${state.busq?`"${state.busq}"`:state.activeCat==='Todos'?'Todos los productos':state.activeCat}</div>
    <span style="font-size:.7rem;color:var(--T2);">${lista.length} productos</span>
  </div>
  <div class="cats-scroll">${['Todos',...categorias].map(c=>`<div class="cat-chip ${state.activeCat===c?'active':''}" onclick="selCat('${c}')">${c}</div>`).join('')}</div>
  <div class="prod-grid">${lista.length?lista.map(mkCard).join(''):'<div class="empty-sec" style="grid-column:1/-1">Sin productos</div>'}</div>`;
}

function renderDetalle(){
  const p=productos.find(x=>x.id===state.detalle);if(!p)return;
  const imgs=p.fotos?.length?p.fotos:[null];
  const isFav=favs.includes(p.id);
  const vars=p.vars||{};
  state.cant=1;if(!state.varSel[p.id])state.varSel[p.id]={};

  Q('app').innerHTML=`
  <div class="det-imgs" id="det-imgs-wrap">
    <div class="det-imgs-slide" id="det-slide" style="touch-action:pan-y;">

    <div class="det-precio-wrap">

    <div class="vars-row">${vars.vals.map(v=>`<button class="var-chip ${state.varSel[p.id]?.val===v?'sel':''}" onclick="selVar('${p.id}','${v}',this)">${v}</button>`).join('')}</div>`:''}
    <div class="cant-row">

      <span style="font-size:.76rem;color:var(--T2);">Total: <b style="color:var(--T);" id="det-total">$${Number(p.precio).toFixed(2)}</b></span>
    </div>

  <div class="det-bar">
    <button class="btn-add-cart" onclick="addDetalle()"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Carrito</button>
    <button class="btn-comprar" onclick="comprarAhora()">Comprar ahora →</button>
  </div>`;

  // Swipe galería
  if(imgs.length>1){
    const slide=Q('det-slide');let sx=0;
    slide.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
    slide.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-sx;
      if(Math.abs(dx)>40){
        state.imgIdx=Math.max(0,Math.min(imgs.length-1,state.imgIdx+(dx<0?1:-1)));
        slide.style.transform=`translateX(-${state.imgIdx*100}vw)`;
        document.querySelectorAll('.det-dot').forEach((d,i)=>d.classList.toggle('active',i===state.imgIdx));
      }
    },{passive:true});
  }
}

// ── ACCIONES ───────────────────────────────────────────────────────
function selCat(c){state.activeCat=c;if(state.view==='inicio')irA('catalogo');else render();}
function toggleFav(e,id){e.stopPropagation();const i=favs.indexOf(id);if(i>=0){favs.splice(i,1);toast('Eliminado de favoritos');}else{favs.push(id);toast('❤️ Guardado');}localStorage.setItem('nexstore_favs_'+SLUG,JSON.stringify(favs));render();}
function addRapido(e,id){e.stopPropagation();const p=productos.find(x=>x.id===id);if(!p)return;addToCart(p,1,{});toast('✓ Agregado');}
function verDetalle(id){state.prevView=state.view;state.detalle=id;state.view='detalle';state.cant=1;state.imgIdx=0;render();window.scrollTo(0,0);}
function goBack(){state.view=state.prevView||'inicio';render();}
function selVar(pid,v,btn){if(!state.varSel[pid])state.varSel[pid]={};state.varSel[pid].val=v;document.querySelectorAll('.var-chip').forEach(b=>b.classList.toggle('sel',b.textContent===v));}
function cambiarCant(dir){const p=productos.find(x=>x.id===state.detalle);state.cant=Math.max(1,Math.min(p?.stock||99,state.cant+dir));const el=Q('det-cant');const tot=Q('det-total');if(el)el.textContent=state.cant;if(tot&&p)tot.textContent='$'+(Number(p.precio)*state.cant).toFixed(2);}
function addDetalle(){const p=productos.find(x=>x.id===state.detalle);if(!p)return;addToCart(p,state.cant,state.varSel[p.id]||{});toast('✓ Agregado al carrito');}
function comprarAhora(){const p=productos.find(x=>x.id===state.detalle);if(!p)return;addToCart(p,state.cant,state.varSel[p.id]||{});iniciarCheckout();}
function cambiarCantCart(i,dir){carrito[i].cant=Math.max(1,(carrito[i].cant||1)+dir);saveCart();updateCartBadge();render();}
function elimCart(i){carrito.splice(i,1);saveCart();updateCartBadge();render();}
function toggleSearch(){Q('search-wrap').classList.toggle('show');if(Q('search-wrap').classList.contains('show'))Q('search-inp').focus();}
function buscar(v){state.busq=v;if(state.view!=='catalogo')irA('catalogo');else render();}

function iniciarCheckout(){
  if(!cliente){mostrarAuth('login',()=>iniciarCheckout());return;}
  state.checkout={paso:1,metodo:'transferencia'};state.comprobante64='';
  irA('checkout');
}

function siguientePaso(){
  if(state.checkout.paso===1){
    const nom=Q('ck-nombre')?.value.trim();const ced=Q('ck-cedula')?.value.trim();
    if(!nom||!ced){toast('Completa los campos obligatorios');return;}
    state.checkout.datos={nombre:nom,apellido:Q('ck-apellido')?.value.trim(),cedula:ced,tel:Q('ck-tel')?.value.trim(),email:Q('ck-email')?.value.trim(),dir:Q('ck-dir')?.value.trim(),ciudad:Q('ck-ciudad')?.value.trim(),envio:Q('ck-envio')?.value};
  }
  state.checkout.paso=Math.min(3,state.checkout.paso+1);render();
}
function anteriorPaso(){state.checkout.paso=Math.max(1,state.checkout.paso-1);render();}
function selMetodo(m){state.checkout.metodo=m;render();}
function subirComprobante(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{state.comprobante64=e.target.result;const prev=Q('comp-preview');if(prev){prev.src=e.target.result;prev.style.display='block';}};r.readAsDataURL(f);
}

async function confirmarPedido(){
  const d=state.checkout.datos||{};
  const envio=getTotal()>=(tienda?.envio_gratis_desde||50)?0:Number(tienda?.envio_costo||3.99);
  const orderId='NEX-'+Date.now().toString(36).toUpperCase();
  const {error}=await db.from('pedidos').insert({
    id:orderId,tienda_id:tienda.id,
    cliente_id:cliente?.id||null,
    cliente_nombre:d.nombre,cliente_apellido:d.apellido,
    cliente_email:d.email||cliente?.email,cliente_cedula:d.cedula,
    cliente_tel:d.tel,cliente_dir:d.dir,cliente_ciudad:d.ciudad,
    metodo_envio:d.envio,metodo_pago:state.checkout.metodo,
    estado:'nuevo',
    items:carrito.map(i=>({id:i.id,nom:i.nombre,cant:i.cant||1,precio:i.precio})),
    subtotal:getTotal(),envio,total:getTotal()+envio,
    comprobante:state.comprobante64||null
  });
  if(error){toast('Error al procesar pedido: '+error.message);return;}
  state.lastOrder=orderId;carrito=[];saveCart();updateCartBadge();
  irA('success');
}
async function verMisPedidos(){
  if(!cliente){mostrarAuth('login',verMisPedidos);return;}
  const {data}=await db.from('pedidos').select('*').eq('tienda_id',tienda.id).eq('cliente_id',cliente.id).order('created_at',{ascending:false});
  const peds=data||[];
  Q('mis-pedidos-body').innerHTML=peds.length?peds.map(p=>`<div style="background:var(--B2);border-radius:12px;padding:12px;margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <span style="font-size:.78rem;font-weight:800;">#${p.id}</span>
      <span style="font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(108,92,231,.15);color:var(--P);">${p.estado}</span>
    </div>
    <div style="font-size:.72rem;color:var(--T2);margin-bottom:4px;">${new Date(p.created_at).toLocaleDateString('es-EC')}</div>
    <div style="font-size:.9rem;font-weight:900;">$${Number(p.total).toFixed(2)}</div>
    ${p.comprobante?`<img src="${p.comprobante}" style="width:100%;border-radius:9px;margin-top:8px;cursor:pointer;" onclick="Q('lb-img').src='${p.comprobante}';Q('lightbox').classList.add('on')">`:''}
  </div>`).join('') : '<div class="empty-sec">Sin pedidos aún</div>';
  Q('mod-mis-pedidos').classList.add('on');
}

function cerrarSesion(){cliente=null;localStorage.removeItem('nexstore_cliente_'+SLUG);render();toast('Sesión cerrada');}
function irAPerfil(){state.view='perfil';render();window.scrollTo(0,0);}

function irA(v){
  const ocultar=['detalle','checkout','success'];
  Q('tab-bar').style.display=ocultar.includes(v)?'none':'flex';
  if(v==='checkout'&&!carrito.length){toast('Tu carrito está vacío');return;}
  state.view=v;render();window.scrollTo(0,0);
}

function render(){
  ['inicio','catalogo','carrito','perfil'].forEach(v=>{const t=Q('tab-'+v);if(t)t.classList.toggle('active',state.view===v);});
  if(state.view==='inicio')renderInicio();
  else if(state.view==='catalogo')renderCatalogo();
  else if(state.view==='detalle')renderDetalle();
  else if(state.view==='carrito')renderCarrito();
  else if(state.view==='checkout')renderCheckout();
  else if(state.view==='success')renderSuccess();
  else if(state.view==='perfil')renderPerfil();
}
</script>
</body>
</html>
